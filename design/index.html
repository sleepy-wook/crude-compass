<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>K-Petroleum · Decision Support Agent</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red: #FF3621;
    --red-soft: #ffece9;
    --green: #1B3139;
    --green-2: #243f48;
    --green-3: #2f535e;
    --bg: #FCFCFB;
    --panel: #FFFFFF;
    --line: #ECECE8;
    --line-2: #E2E2DD;
    --ink: #1B3139;
    --ink-2: #4A5C63;
    --ink-3: #7A8A91;
    --ink-4: #A9B4B9;
    --ok: #10B981;
    --warn: #F59E0B;
    --danger: #FF3621;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --display: 'Space Grotesk', 'IBM Plex Sans KR', sans-serif;
    --body: 'IBM Plex Sans', 'IBM Plex Sans KR', system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  body{min-width:1280px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  ::selection{background:var(--red);color:#fff}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .display{font-family:var(--display);letter-spacing:-.02em}
  .scrollbar::-webkit-scrollbar{width:10px;height:10px}
  .scrollbar::-webkit-scrollbar-thumb{background:#dcdcd6;border-radius:10px;border:2px solid var(--bg)}
  .scrollbar::-webkit-scrollbar-thumb:hover{background:#c4c4be}

  /* hairline */
  .hl{border:1px solid var(--line)}
  .hr{height:1px;background:var(--line);width:100%}

  /* button */
  .btn{display:inline-flex;align-items:center;gap:8px;height:36px;padding:0 14px;border-radius:6px;font-weight:500;font-size:13px;transition:transform .12s ease, background .12s ease, border-color .12s ease;border:1px solid transparent;white-space:nowrap}
  .btn-primary{background:var(--red);color:#fff}
  .btn-primary:hover{background:#ed2e1a}
  .btn-primary:active{transform:translateY(1px)}
  .btn-ghost{background:transparent;color:var(--ink);border-color:var(--line-2)}
  .btn-ghost:hover{background:#f4f4ef;border-color:#cfcfc8}
  .btn-dark{background:var(--green);color:#fff}
  .btn-dark:hover{background:var(--green-2)}

  /* pill */
  .pill{display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 8px;border-radius:999px;font-size:11px;font-weight:500;font-family:var(--mono);letter-spacing:.02em}
  .pill-danger{background:var(--red-soft);color:#b81d0a}
  .pill-warn{background:#FFF6E5;color:#8a5a06}
  .pill-ok{background:#E5F7EE;color:#06724a}
  .pill-neutral{background:#F0F0EB;color:var(--ink-2)}
  .pill-dark{background:var(--green);color:#fff}

  .dot{width:6px;height:6px;border-radius:99px;display:inline-block}
  .blink{animation: blink 1.6s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

  /* card hover lift */
  .lift{transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease}
  .lift:hover{transform:translateY(-1px);box-shadow:0 6px 20px -10px rgba(27,49,57,.18);border-color:#d6d6cf}

  .label-mini{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:600}

  .stagger > *{opacity:0;transform:translateY(8px);animation:fadeup .5s cubic-bezier(.2,.7,.2,1) forwards}
  .stagger > *:nth-child(1){animation-delay:.04s}
  .stagger > *:nth-child(2){animation-delay:.10s}
  .stagger > *:nth-child(3){animation-delay:.16s}
  .stagger > *:nth-child(4){animation-delay:.22s}
  .stagger > *:nth-child(5){animation-delay:.28s}
  .stagger > *:nth-child(6){animation-delay:.34s}
  @keyframes fadeup{to{opacity:1;transform:none}}

  /* tabs */
  .tab{height:40px;padding:0 16px;display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--ink-2);border-bottom:2px solid transparent;cursor:pointer}
  .tab.active{color:var(--ink);border-bottom-color:var(--red)}

  /* nav */
  .nav-item{display:flex;align-items:center;gap:10px;height:38px;padding:0 12px;border-radius:6px;color:#A9B4B9;font-size:13.5px;font-weight:500;cursor:pointer;border-left:2px solid transparent;margin-left:-2px;transition:color .15s, background .15s}
  .nav-item:hover{color:#fff;background:rgba(255,255,255,.04)}
  .nav-item.active{color:#fff;background:rgba(255,54,33,.08);border-left-color:var(--red)}
  .nav-item kbd{font-family:var(--mono);font-size:10px;color:#5a6c73;margin-left:auto;padding:1px 5px;border:1px solid #2f535e;border-radius:3px}

</style>
<script type="application/json" id="speaker-notes">[]</script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/charts.jsx"></script>
<script type="text/babel" src="src/sidebar.jsx"></script>

<script type="text/babel" src="src/page-mission.jsx"></script>
