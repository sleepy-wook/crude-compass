# Crude Compass — Declarative Automation Bundle
# (구 Asset Bundle, 2026 리브랜딩)
#
# 배포 명령:
#   databricks bundle validate --target dev --profile crude-compass
#   databricks bundle deploy   --target dev --profile crude-compass
#   databricks bundle run news_pipeline_2hr --target dev --profile crude-compass
#
# Sprint 2-3 진입 시 jobs/, agents/ 안의 yml 파일을 추가하면서 본격 활용.

bundle:
  name: crude-compass

include:
  - jobs/*.yml
  - agents/*.yml

variables:
  catalog:
    description: "Unity Catalog name (Bronze/Silver/Gold)"
    default: crude_compass

  schema_bronze:
    default: bronze
  schema_silver:
    default: silver
  schema_gold:
    default: gold

  warehouse_id:
    description: "SQL warehouse for ad-hoc queries (optional)"
    default: ""

targets:
  dev:
    mode: development
    default: true
    workspace:
      # databricks CLI profile의 host 자동 사용
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    run_as:
      user_name: ${workspace.current_user.userName}

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    run_as:
      user_name: ${workspace.current_user.userName}

# resources는 include 된 jobs/*.yml + agents/*.yml에서 정의
resources:
  jobs: {}
