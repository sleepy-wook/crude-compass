# Lakeflow Job — price_pipeline_5min
# 시나리오 v2 § 12 #3 + § 8 실시간 spike 트리거.

resources:
  jobs:
    price_pipeline_5min:
      name: ${bundle.name}-price-pipeline-${bundle.target}
      description: "OilPriceAPI 3 ticker → bronze.oil_prices + spike 감지"

      schedule:
        quartz_cron_expression: "0 0/5 * * * ?"  # 5분 (Sprint 2: PAUSED, 5/15+ active)
        timezone_id: Asia/Seoul
        pause_status: PAUSED

      tasks:
        - task_key: price_fetch
          notebook_task:
            notebook_path: ../notebooks/job_price.py
            source: WORKSPACE
          timeout_seconds: 120

      max_concurrent_runs: 1

      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}

      tags:
        project: crude-compass
        layer: bronze
        source: oilpriceapi
