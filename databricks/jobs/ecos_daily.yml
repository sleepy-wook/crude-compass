resources:
  jobs:
    ecos_daily:
      name: ${bundle.name}-ecos-daily-${bundle.target}
      description: "ECOS 한국은행 KRW/USD 일별 → bronze.fx_rates"
      schedule:
        quartz_cron_expression: "0 0 18 ? * MON-FRI"  # 평일 18:00 KST
        timezone_id: Asia/Seoul
        pause_status: UNPAUSED
      tasks:
        - task_key: ecos_fetch
          notebook_task:
            notebook_path: ../notebooks/job_ecos.py
            source: WORKSPACE
          # 5/12 timeout 1회 발생 → 120s → 180s 안전 buffer
          timeout_seconds: 180
      max_concurrent_runs: 1
      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}
      tags:
        project: crude-compass
        layer: bronze
        source: ecos
