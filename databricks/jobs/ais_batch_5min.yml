# Lakeflow Job — ais_batch_5min
# 시나리오 v2 § 7 #1 + § 12 #4

resources:
  jobs:
    ais_batch_5min:
      name: ${bundle.name}-ais-batch-${bundle.target}
      description: "AISStream WebSocket 30s collect → bronze.ais_positions"

      schedule:
        quartz_cron_expression: "0 0/5 * * * ?"
        timezone_id: Asia/Seoul
        pause_status: UNPAUSED  # 5/14 D-4: K-Petroleum 5척 lifecycle 누적 시작

      tasks:
        - task_key: ais_collect
          notebook_task:
            notebook_path: ../notebooks/job_ais.py
            source: WORKSPACE
          # 180s WebSocket collect + Spark write + serverless cold start 여유
          timeout_seconds: 360

      max_concurrent_runs: 1

      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}

      tags:
        project: crude-compass
        layer: bronze
        source: aisstream
