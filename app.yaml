# Databricks Apps deployment manifest — Crude Compass
#
# Deploy (Option B: Git source + Apps 자동 build, 5/17 D-1 reframe):
#   # (1) GitHub push (Apps가 main branch 자동 fetch)
#   git push origin main
#   # (2) Apps deploy (Git source 자동, --source-code-path 불필요)
#   databricks --profile crude-compass apps deploy crude-compass
#
# Build pipeline (Apps 자동 처리):
#   1. root package.json 감지 → npm install (no-op, deps 없음)
#   2. npm run build → corepack pnpm activate → cd frontend && pnpm install + build
#   3. frontend/dist 생성됨 (FastAPI static serve target)
#   4. root requirements.txt 감지 → pip install (backend deps)
#   5. command 실행 → uvicorn app.main:app --app-dir backend
#      └ --app-dir backend: PYTHONPATH에 backend/ 추가 → app.main 모듈 import
#
# Public URL: https://crude-compass-7474656526809380.aws.databricksapps.com
# Slack Interactivity URL → Slack app config "Request URL":
#   https://<public-url>/api/slack/interactive
#
# Resources (App overview → "Resources" 탭 → "Add resource"):
# - Secret resource × 10 (lakebase_* / slack_* / *_api_key) — scope=crude
# - Genie space resource — key=genie_space_id, permission=Can run
# - Serving endpoint resource × 3 (FMA Haiku + KA endpoint + Supervisor endpoint)
# 매 resource 추가 후 재배포 필요.

command:
  - uvicorn
  - app.main:app
  - --host
  - 0.0.0.0
  - --app-dir
  - backend
  # --app-dir backend: source root = repo root이라 backend/ subdir의 app.main 모듈 import 위해 PYTHONPATH 추가
  # DATABRICKS_APP_PORT 자동 inject — uvicorn은 --port 명시 안 해도 PORT env 감지

env:
  # Lakebase (production persistence)
  - name: LAKEBASE_HOST
    valueFrom: lakebase_host
  - name: LAKEBASE_DATABASE
    valueFrom: lakebase_database
  - name: LAKEBASE_USER
    valueFrom: lakebase_user
  - name: LAKEBASE_ENDPOINT_PATH
    valueFrom: lakebase_endpoint_path

  # Slack — Bolt AsyncApp (양방향 5초 sync)
  - name: SLACK_BOT_TOKEN
    valueFrom: slack_bot_token
  - name: SLACK_SIGNING_SECRET
    valueFrom: slack_signing_secret
  - name: SLACK_DEFAULT_CHANNEL
    valueFrom: slack_default_channel

  # Genie Space (D-2 형욱 manual 등록 후 — 미설정이면 fallback)
  - name: GENIE_SPACE_ID
    valueFrom: genie_space_id

  # Agent Bricks Supervisor Agent endpoint (D-2 형욱 manual 등록 후)
  # 4 sub-agent (Genie + KA + IE + FMA) 오케스트레이션. 미설정이면 Genie fallback.
  - name: SUPERVISOR_ENDPOINT_NAME
    valueFrom: supervisor_endpoint_name

  # External API (OilPriceAPI / ECOS / EIA)
  - name: OILPRICE_API_KEY
    valueFrom: oilprice_api_key
  - name: ECOS_API_KEY
    valueFrom: ecos_api_key
  - name: EIA_API_KEY
    valueFrom: eia_api_key

  # Behavior flags
  - name: USE_LAKEBASE
    value: "true"     # production = Lakebase persistence
  - name: DEMO_MODE
    value: "true"     # /api/demo/inject_signal 노출 (데모 시연용)

  # Databricks SDK는 Apps 환경에서 workspace OAuth 자동 (profile 불필요)
